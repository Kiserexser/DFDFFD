name: Build Mod JAR
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.8
      - run: gradle build --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: HitboxMod-JAR
          path: build/libs/*.jar
